{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}
{% block page_title %}Dashboard{% endblock %}

{% block content %}
<div class="row g-4">

    <!-- Card Total -->
    <div class="col-md-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body d-flex align-items-center gap-3 p-4">
                <div class="bg-primary bg-opacity-10 rounded-3 p-3">
                    <i class="bi bi-people-fill text-primary fs-3"></i>
                </div>
                <div>
                    <div class="text-muted small">Total Alumnos</div>
                    <div class="fs-2 fw-bold">{{ total_alumnos }}</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Card Activos -->
    <div class="col-md-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body d-flex align-items-center gap-3 p-4">
                <div class="bg-success bg-opacity-10 rounded-3 p-3">
                    <i class="bi bi-person-check-fill text-success fs-3"></i>
                </div>
                <div>
                    <div class="text-muted small">Activos</div>
                    <div class="fs-2 fw-bold">{{ activos }}</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Card Inactivos -->
    <div class="col-md-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body d-flex align-items-center gap-3 p-4">
                <div class="bg-secondary bg-opacity-10 rounded-3 p-3">
                    <i class="bi bi-person-x-fill text-secondary fs-3"></i>
                </div>
                <div>
                    <div class="text-muted small">Inactivos</div>
                    <div class="fs-2 fw-bold">{{ inactivos }}</div>
                </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}

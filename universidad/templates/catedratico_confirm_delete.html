<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Catedrático</title>
</head>
<body>
    <h1>Eliminar Catedrático</h1>

    <p>¿Seguro que deseas eliminar a <strong>{{ catedratico.nombre }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
        <a href="{% url 'catedratico:list' %}">Cancelar</a>
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% if form.instance.pk %}Editar{% else %}Crear{% endif %} Catedrático</title>
</head>
<body>

<h1>{% if form.instance.pk %}Editar{% else %}Crear{% endif %} Catedrático</h1>

<form method="post">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <button type="submit">Guardar</button>
    <a href="{% url 'catedratico:list' %}">Cancelar</a>
</form>

</body>
</html>

{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
    <h2>Eliminar Curso</h2>

    <p>¿Seguro que deseas eliminar el curso <b>{{ curso.nombre }}</b>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'curso:list' %}" class="btn btn-secondary">Cancelar</a>
    </form>

</div>

{% endblock %}

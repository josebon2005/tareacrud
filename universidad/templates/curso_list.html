{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
    <h2>Cursos</h2>

    <a href="{% url 'curso:create' %}" class="btn btn-primary mb-3">
        Crear Curso
    </a>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Créditos</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
        {% for curso in cursos %}
            <tr>
                <td>{{ curso.id }}</td>
                <td>{{ curso.nombre }}</td>
                <td>{{ curso.creditos }}</td>
                <td>
                    <a href="{% url 'curso:edit' curso.id %}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="{% url 'curso:delete' curso.id %}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="4">No hay cursos registrados</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}

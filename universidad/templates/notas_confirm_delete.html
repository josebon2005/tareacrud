{% extends 'base.html' %}

{% block title %}Eliminar Nota{% endblock %}
{% block page_title %}Eliminar Nota{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h5>¿Seguro que deseas eliminar esta nota?</h5>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Eliminar</button>
            <a href="{% url 'notas_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}

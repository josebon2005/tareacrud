{% extends 'base.html' %}

{% block title %}Formulario Nota{% endblock %}
{% block page_title %}Formulario Nota{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5>Formulario de Nota</h5>
    </div>

    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{% url 'notas_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
